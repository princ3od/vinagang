<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XpertFinder architecture</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #FAF9F5;
    color: #2C2C2A;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap { width: 100%; max-width: 760px; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  p.sub { margin: 0 0 24px; color: #5F5E5A; font-size: 15px; line-height: 1.6; }
  .card {
    background: #FFFFFF;
    border: 1px solid #D3D1C7;
    border-radius: 14px;
    padding: 20px;
  }
  svg { width: 100%; height: auto; display: block; }
  .t  { font-size: 14px; font-weight: 400; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
</style>
</head>
<body>
<div class="wrap">
  <h1>XpertFinder architecture</h1>
  <p class="sub">Ask in Slack, an LLM scores expertise, the bot ranks by who is actually free, and opens a direct DM. No manager relay.</p>
  <div class="card">
<svg viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>XpertFinder architecture, high level</title>
<desc>A Slack slash-command flows through the bot into a three-step brain pipeline: retrieve candidate experts, score their expertise with an LLM, and rank by availability, returning the best reachable expert and opening a direct DM. Expert profiles and external services feed the pipeline.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<line x1="340" y1="100" x2="340" y2="136" stroke="#444441" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="340" y1="194" x2="340" y2="230" stroke="#444441" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="340" y1="288" x2="340" y2="324" stroke="#444441" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="340" y1="382" x2="340" y2="418" stroke="#444441" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="340" y1="476" x2="340" y2="512" stroke="#444441" stroke-width="1.6" marker-end="url(#arrow)"/>

<line x1="178" y1="270" x2="198" y2="262" stroke="#888780" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="178" y1="344" x2="198" y2="352" stroke="#888780" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="502" y1="260" x2="482" y2="260" stroke="#888780" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<line x1="502" y1="354" x2="482" y2="354" stroke="#888780" stroke-width="1.3" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<rect x="200" y="44" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="67" text-anchor="middle" fill="#2C2C2A">Slack</text>
<text class="ts" x="340" y="85" text-anchor="middle" fill="#5F5E5A">/xpert question, Connect me</text>

<rect x="200" y="138" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="161" text-anchor="middle" fill="#2C2C2A">XpertFinder bot</text>
<text class="ts" x="340" y="179" text-anchor="middle" fill="#5F5E5A">Socket Mode, no public URL</text>

<rect x="200" y="232" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="255" text-anchor="middle" fill="#2C2C2A">1 &#183; Retrieve</text>
<text class="ts" x="340" y="273" text-anchor="middle" fill="#5F5E5A">match experts, keyword by keyword</text>

<rect x="200" y="326" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="349" text-anchor="middle" fill="#2C2C2A">2 &#183; Score expertise</text>
<text class="ts" x="340" y="367" text-anchor="middle" fill="#5F5E5A">LLM rates each profile</text>

<rect x="200" y="420" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="443" text-anchor="middle" fill="#2C2C2A">3 &#183; Rank</text>
<text class="ts" x="340" y="461" text-anchor="middle" fill="#5F5E5A">expertise &#215; availability</text>

<rect x="200" y="514" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="537" text-anchor="middle" fill="#2C2C2A">Best reachable expert</text>
<text class="ts" x="340" y="555" text-anchor="middle" fill="#5F5E5A">opens a direct DM</text>

<rect x="40" y="232" width="138" height="150" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="109" y="270" text-anchor="middle" fill="#2C2C2A">Profiles</text>
<text class="ts" x="109" y="296" text-anchor="middle" fill="#5F5E5A">projects, git,</text>
<text class="ts" x="109" y="316" text-anchor="middle" fill="#5F5E5A">Jira, HR, certs</text>

<rect x="502" y="232" width="138" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="571" y="255" text-anchor="middle" fill="#2C2C2A">gbrain</text>
<text class="ts" x="571" y="273" text-anchor="middle" fill="#5F5E5A">keyword search</text>

<rect x="502" y="326" width="138" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="571" y="349" text-anchor="middle" fill="#2C2C2A">LLM API</text>
<text class="ts" x="571" y="367" text-anchor="middle" fill="#5F5E5A">hosted model</text>
</svg>
  </div>
</div>
</body>
</html>
