# XpertFinder Slack app manifest.
# Create the app in one step: api.slack.com/apps -> Create New App -> From an app manifest
# -> pick your workspace -> paste this YAML.
# Socket Mode is on, so no request URLs / ngrok are needed.
#
# After creating:
#   1. Basic Information -> App-Level Tokens -> Generate token, scope: connections:write
#      -> that xapp-... value is SLACK_APP_TOKEN
#   2. Install to Workspace -> Bot User OAuth Token (xoxb-...) is SLACK_BOT_TOKEN
#   3. Put both in .env, then: python bot.py
display_information:
  name: XpertFinder
  description: Cut the manager relay. Ask a question, get introduced to the right expert.
  background_color: "#185fa5"
features:
  bot_user:
    display_name: xpertfinder
    always_online: true
  slash_commands:
    - command: /xpert
      description: Find who knows something and get introduced directly
      usage_hint: how do I deploy SAP to Azure?
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands      # receive the /xpert slash command
      - chat:write    # post the intro message
      - im:write      # open a direct message with the requester
      - mpim:write    # open a group DM between requester and expert
settings:
  interactivity:
    is_enabled: true  # needed for the "Connect me" button (delivered over Socket Mode)
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
